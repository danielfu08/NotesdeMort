<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>A-Frame — final.glb con puerta y llave</title>

  <!-- scaperoom -->
  <script src="https://agarci9inscastellet.github.io/scaperoom/js/scaperoom.js"></script>

  <!-- aframe -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
</head>
<body>

<a-scene cursor="rayOrigin: mouse"
         renderer="antialias: true; colorManagement: true"
         raycaster="objects: .clickable">

  <!-- Assets -->
  <a-assets>

    <a-asset-item id="finalModel" src="infermeria.glb"></a-asset-item>
    <a-asset-item id="muerto" src="muerto.glb"></a-asset-item>

    <!-- puerta -->
    <a-asset-item id="doorModel" src="/door.glb"></a-asset-item>

    <!-- llave -->
    <a-asset-item id="keyModel" src="key.glb"></a-asset-item>

  </a-assets>


  <!-- escenario -->
  <a-entity gltf-model="#finalModel"
            position="0 -4.5 0"
            rotation="0 0 0"
            scale="1 1 1">
  </a-entity>


  <!-- muerto -->
  <a-entity gltf-model="#muerto"
            position="-2 -0.75 1.1"
            rotation="0 90 0"
            scale="0.01 0.01 0.01">
  </a-entity>

<a-entity id="door1" gltf-model="door.glb" position="0.45 -1.4 -0.3"  scale="0.005 0.01 0.008" class="aframe-clickable">
  </a-entity>
  <!-- PUERTA -->
  <a-entity id="door1"
            gltf-model="#doorModel"
            position="0.45 -1.4 -0.3"
            rotation="0 -90 0"
            scale="0.005 0.01 0.008">
  </a-entity>
  </a-entity>
  <!-- LLAVE -->
  <a-entity id="key1"
            gltf-model="#keyModel"
            position="-3 0.6 -1.5"
            rotation="0 0 0"
            scale="0.0005 0.0005 0.0005"
            animation="property: rotation;
                       to: 0 360 0;
                       loop: true;
                       dur: 2000;
                       easing: linear">
  </a-entity>


  <!-- TELEPORTS -->
  <a-sphere class="teleport" position="1 0 0" radius="0.05" color="#FF0000"></a-sphere>
  <a-sphere class="teleport" position="0 0 1" radius="0.05" color="#FF0000"></a-sphere>
  <a-sphere class="teleport" position="-1 0 -0.5" radius="0.05" color="#FF0000"></a-sphere>
  <a-sphere class="teleport" position="-2 2.5 -1" radius="0.05" color="#FF0000"></a-sphere>


  <!-- jugador -->
  <a-entity id="playerRig" position="0 0 1">
    <a-entity camera look-controls>
      <a-cursor fuse="false" raycaster="objects: .teleport, .clickable"></a-cursor>
    </a-entity>
  </a-entity>


  <!-- luces -->
  <a-entity light="type: ambient; intensity: 0.7"></a-entity>
  <a-entity light="type: directional; intensity: 1"
            position="105 -190 5"
            rotation="-45 45 0"></a-entity>

</a-scene>


<!-- TELEPORT -->
<script>

AFRAME.registerComponent('teleport-on-click', {

  init: function () {

    const spheres = document.querySelectorAll('.teleport');
    const player = document.getElementById('playerRig');

    spheres.forEach(function(sphere) {

      sphere.addEventListener('click', function () {

        const pos = sphere.getAttribute('position');

        player.setAttribute('position',
          `${pos.x} ${pos.y} ${pos.z}`);

      });

    });

  }

});

document.querySelector('a-scene')
        .setAttribute('teleport-on-click', '');

</script>


</body>
</html>
