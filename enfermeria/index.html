<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>A-Frame — passadis.glb con teletransporte</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://agarci9inscastellet.github.io/scaperoom/js/scaperoom.js"></script>

  <script defer>
     if (new URLSearchParams(window.location.search).has('?clear')){
      resetStatus();
     }

  </script>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>
<body>
  <a-scene cursor="rayOrigin: mouse" 
            renderer="antialias: true; colorManagement: true">

    <!-- Carga del GLB -->
    <a-assets>
      <a-asset-item id="noteModel4" src="../assets/note.glb"></a-asset-item>
      <a-asset-item id="enfModel" src="infermeria.glb"></a-asset-item>
      <a-asset-item id="doorModel" src="../assets/door6.glb"></a-asset-item>
      
    </a-assets>

    <!-- Modelo visual -->
    <a-entity gltf-model="#enfModel"
              position="-12.01424 -242.86606 -37.58726"
              rotation="0 0 0"
              scale="50 50 50"
              material="metalness:0; roughness:1">
    </a-entity>

    <a-entity id="note4"
        class="clickable" 
        gltf-model="#noteModel4"
        position="-64.4913 6.64051 -119.80259"    
        rotation="90 0 0"
        scale="1 1 1"
        material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door6" 
        gltf-model="#doorModel" 
        position="-0.61095 -93.06797 40.0186"    
        rotation="0 180 0" 
        scale="55 60 55" 
        material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door6-2" 
        gltf-model="#doorModel" 
        position="-196.16752 -92.93245 -37.30732"    
        rotation="0 270 0" 
        scale="55 60 55" 
        material="metalness:0; roughness:1">
      </a-entity> 

    <!-- Esferas de teletransporte -->
    <a-sphere class="teleport" position="0 -15 0" radius="2" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="-50 -15 -50" radius="2" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="-100 -15 -50" radius="2" color="#FF0000"></a-sphere>



    <!-- Cámara / jugador -->
    <a-entity id="playerRig" position="0 0 0">
      <a-entity camera look-controls>
        <!-- Cursor para hacer click -->
        <a-cursor fuse="false" raycaster="objects: .teleport, .teleport2"></a-cursor>
      </a-entity>
    </a-entity>

    <!-- Iluminación -->
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="105 -190 5" rotation="-45 45 0"></a-entity>
    <a-entity light="type: hemisphere; skyColor: #000000; groundColor: #000000; intensity: 0.5"></a-entity>

    <!-- Componente de teletransporte -->
    <script>
      AFRAME.registerComponent('teleport-on-click', {
  init: function () {
    const player = document.getElementById('playerRig');

    // Teleport normal
    const teleports = document.querySelectorAll('.teleport');
    teleports.forEach(function (sphere) {
      sphere.addEventListener('click', function () {
        const pos = sphere.getAttribute('position');
        player.setAttribute('position', `${pos.x} ${pos.y+15} ${pos.z}`);
      });
    });    
  }
});

      document.querySelector('a-scene').setAttribute('teleport-on-click', '');
    </script>

  </a-scene>

<script defer>
  catchableObject("#note4","status_nota 4", "📝4");
  questionGate("#door6", 0, "../passadis/index.html", "status_nota 3");
  questionGate("#door6-2", 0, "../preso/index.html", "status_nota 4");


</script>

</body>
</html>
