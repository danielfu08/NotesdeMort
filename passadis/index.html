<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>A-Frame — passadis.glb con teletransporte</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://agarci9inscastellet.github.io/scaperoom/js/scaperoom.js"></script>

  <script defer>
     if (new URLSearchParams(window.location.search).has('?clear')){
      resetStatus();
     }

  </script>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>
<body>
  <a-scene cursor="rayOrigin: mouse" renderer="antialias: true; colorManagement: true">

    <!-- Carga del GLB -->
    <a-assets>
      <a-asset-item id="noteModel3" src="../assets/note.glb"></a-asset-item>
      <a-asset-item id="passModel" src="passadis.glb"></a-asset-item>
      <a-asset-item id="trapModel2" src="../assets/trapdoor2.glb"></a-asset-item>
    </a-assets>

    <!-- Modelo visual -->
    <a-entity gltf-model="#passModel"
              position="151.796 -89 -200"
              rotation="0 0 0"
              scale="0.25 0.25 0.25"
              material="metalness:0; roughness:1">
    </a-entity>
    <a-entity 
              id="trampilla2"
              gltf-model="#trapModel2"
              position="61.3 10.0 -191.3"
              rotation="-90 180 90"
              scale="5 5 5"
              material="metalness:0; roughness:1">
    </a-entity>

    <a-entity id="note3"
        class="clickable" 
        gltf-model="#noteModel3"
        position="-14.32241 10.14594 -115.2849"    
        rotation="-90 -90 0"
        scale="0.5 0.5 0.5"
        material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door3" 
    gltf-model="../assets/door3.glb" 
    position="11.01031 -22.62749 -5.92073" 
    rotation="0 90 0" 
    scale="0.09 0.09 0.07" 
    material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door4" 
    gltf-model="../assets/door4.glb" 
    position="-16.66232 -22.62749 -128.74757" 
    rotation="0 90 0" 
    scale="0.12 0.12 0.12" 
    material="metalness:0; roughness:1">
      </a-entity>
   <a-entity id="door4-2" 
    gltf-model="../assets/door4.glb" 
    position="53.86637 -22.62749 -219.58258" 
    rotation="0 0 0" 
    scale="0.12 0.12 0.12" 
    material="metalness:0; roughness:1">
      </a-entity>

    <!-- Esferas de teletransporte -->
    <a-sphere class="teleport" position="-1.798 -15.300 -120" radius="2" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="-1.798 -15.300 -10" radius="2" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="50.798 -15.300 -140" radius="2" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="50.798 -15.300 -200" radius="2" color="#FF0000"></a-sphere>


    <!-- Cámara / jugador -->
    <a-entity id="playerRig" position="0 0 0">
      <a-entity camera look-controls>
        <!-- Cursor para hacer click -->
        <a-cursor fuse="false" raycaster="objects: .teleport, .teleport2"></a-cursor>
      </a-entity>
    </a-entity>

    <!-- Iluminación -->
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="105 -190 5" rotation="-45 45 0"></a-entity>
    <a-entity light="type: hemisphere; skyColor: #000000; groundColor: #000000; intensity: 0.5"></a-entity>

    <!-- Componente de teletransporte -->
    <script>
      AFRAME.registerComponent('teleport-on-click', {
  init: function () {
    const player = document.getElementById('playerRig');

    // Teleport normal
    const teleports = document.querySelectorAll('.teleport');
    teleports.forEach(function (sphere) {
      sphere.addEventListener('click', function () {
        const pos = sphere.getAttribute('position');
        player.setAttribute('position', `${pos.x} ${pos.y + 15} ${pos.z}`);
      });
    });

    // Teleport diferente
    const teleports2 = document.querySelectorAll('.teleport2');
    teleports2.forEach(function (sphere) {
      sphere.addEventListener('click', function () {
        const pos = sphere.getAttribute('position');

        // Teletransporte distinto
        player.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);

        // Ejemplo extra: cambiar rotación
        player.setAttribute('rotation', `0 0 0`);
      });
    });
  }
});
      document.querySelector('a-scene').setAttribute('teleport-on-click', '');
    </script>

  </a-scene>

<script defer>
  catchableObject("#note3","status_nota 3", "📝3");
  questionGate("#trampilla2", 0, "../conductos/index.html", "status_nota 7");
  questionGate("#door3", 0, "../inici/index.html", "status_nota 2");
  questionGate("#door4", 0, "../enfermeria/index.html", "status_nota 3");
  questionGate("#door4-2", 0, "../biblioteca/index.html", "status_nota 5");

</script>

</body>
</html>
