<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>A-Frame — passadis.glb con teletransporte</title>

  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  <script src="https://agarci9inscastellet.github.io/scaperoom/js/scaperoom.js"></script>

  <script defer>
     if (new URLSearchParams(window.location.search).has('clear')){
      resetStatus();
     }

  </script>

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

</head>
<body>
  <a-scene cursor="rayOrigin: mouse" renderer="antialias: true; colorManagement: true">

    <!-- Carga del GLB -->
    <a-assets>
      <a-asset-item id="noteModel6" src="../assets/note.glb"></a-asset-item>
      <a-asset-item id="biblioModel" src="biblioteca.glb"></a-asset-item>
      <a-asset-item id="doorModel" src="../assets/door5.glb"></a-asset-item>
    </a-assets>

    <!-- Modelo visual -->
    <a-entity gltf-model="#biblioModel"
              position="3 -28.5 5"
              rotation="0 0 0"
              scale="0.25 0.25 0.25"
              material="metalness:0; roughness:1">
    </a-entity>


    <a-entity id="note6"
        class="clickable" 
        gltf-model="#noteModel6"
        position="-6.752 1.34817 17.3257"    
        rotation="90 0 0"
        scale="0.25 0.25 0.25"
        material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door5"
        gltf-model="#doorModel"
        position="4.18014 -9.8 -0.14648"    
        rotation="0 270 0"
        scale="6 6 6"
        material="metalness:0; roughness:1">
      </a-entity>

    <a-entity id="door5-2"
        gltf-model="#doorModel"
        position="-20.096 -9.8 14.60896"    
        rotation="0 270 0"
        scale="6 6 6"
        material="metalness:0; roughness:1">
      </a-entity>    

    <!-- Esferas de teletransporte -->
    <a-sphere class="teleport" position="-8.752 -5 8" radius="0.5" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="0 -5 0" radius="0.5" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="-6 -5 -4" radius="0.5" color="#FF0000"></a-sphere>
    <a-sphere class="teleport" position="-15.752 -5 12.5" radius="0.5" color="#FF0000"></a-sphere>

    




    <!-- Cámara / jugador -->
    <a-entity id="playerRig" position="0 0 0" rotation="0 90 0">
      <a-entity camera look-controls>
        <!-- Cursor para hacer click -->
        <a-cursor fuse="false" raycaster="objects: .teleport, .teleport2"></a-cursor>
      </a-entity>
    </a-entity>

    <!-- Iluminación -->
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="105 -190 5" rotation="-45 45 0"></a-entity>
    <a-entity light="type: hemisphere; skyColor: #000000; groundColor: #000000; intensity: 0.5"></a-entity>

    <!-- Componente de teletransporte -->
    <script>
      AFRAME.registerComponent('teleport-on-click', {
  init: function () {
    const player = document.getElementById('playerRig');

    // Teleport normal
    const teleports = document.querySelectorAll('.teleport');
    teleports.forEach(function (sphere) {
      sphere.addEventListener('click', function () {
        const pos = sphere.getAttribute('position');
        player.setAttribute('position', `${pos.x} ${pos.y + 5} ${pos.z}`);
      });
    });

    // Teleport diferente
    const teleports2 = document.querySelectorAll('.teleport2');
    teleports2.forEach(function (sphere) {
      sphere.addEventListener('click', function () {
        const pos = sphere.getAttribute('position');

        // Teletransporte distinto
        player.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);

        // Ejemplo extra: cambiar rotación
        player.setAttribute('rotation', `0 0 0`);
      });
    });
  }
});
      document.querySelector('a-scene').setAttribute('teleport-on-click', '');
    </script>

  </a-scene>

<script defer>
  catchableObject("#note6","status_nota 6", "📝6");
  questionGate("#door5", 0, "../passadis/index.html", "status_nota 5");
</script>

</body>
</html>
